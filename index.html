<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citampi Stories — Panduan Lengkap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══ HEADER ══ -->
<header id="app-header">
  <div class="h-brand">
    <button id="mob-back" onclick="mobileBack()" style="display:none">← Kembali</button>
    <span class="h-logo">🎮</span>
    <div>
      <div class="h-title">Citampi Stories</div>
      <div class="h-sub">Panduan Lengkap</div>
    </div>
  </div>
  <div class="h-spacer"></div>
  <button id="opt-btn" onclick="toggleOptPanel()">Option</button>
</header>

<!-- ══ APP BODY ══ -->
<div id="app-body">

  <!-- COL 1 · Main Nav (1/8) -->
  <nav id="main-nav">
    <button class="mnav active" data-f="karakter">
      <span class="mnav-icon">👥</span>
      <span class="mnav-lbl">Karakter</span>
    </button>
    <button class="mnav" data-f="item">
      <span class="mnav-icon">🎁</span>
      <span class="mnav-lbl">Item</span>
    </button>
    <button class="mnav" data-f="job">
      <span class="mnav-icon">💼</span>
      <span class="mnav-lbl">Job Info</span>
    </button>
    <button class="mnav" data-f="planning">
      <span class="mnav-icon">📅</span>
      <span class="mnav-lbl">Planning</span>
    </button>
    <div class="mnav-sep"></div>
    <!-- Bag widget — hanya tampil saat Planning aktif -->
    <button class="mnav-bag" id="nav-bag-btn"
      onclick="switchFeatureFromBag()"
      title="Bawaan Hari Ini"
      style="display:none">
      <div class="bag-icon-wrap">
        🎒
        <span class="bag-count" id="bag-count" style="display:none">0</span>
      </div>
      <div class="bag-lbl" id="bag-lbl">Bawaan</div>
      <div class="bag-preview" id="bag-preview"></div>
    </button>
    <div class="mnav-sep" id="nav-bag-sep" style="display:none"></div>
    <button class="mnav mnav-pin" data-f="prioritas">
      <span class="mnav-icon">📌</span>
      <span class="mnav-lbl">Prioritas</span>
      <span class="pin-badge" id="pin-badge" style="display:none">0</span>
    </button>
  </nav>

  <!-- COL 2 · Sub Nav (1/8) -->
  <div id="sub-nav"></div>

  <!-- COL 3+4 · List Panel (2/8) -->
  <div id="list-panel">
    <div id="list-search-wrap">
      <!-- MOBILE: search + filter drawer button -->
      <div id="mob-search-row">
        <div class="search-box" style="margin-bottom:0;flex:1">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input-mob" placeholder="Cari...">
        </div>
        <button id="mob-filter-btn" onclick="toggleDrawer()">☰ Filter</button>
      </div>
      <!-- DESKTOP: original search -->
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Cari...">
      </div>
      <div id="filter-chips"></div>
    </div>
    <div id="list-sort-row">
      <select id="sort-select">
        <option value="heroine">Heroine Dulu</option>
        <option value="az">A → Z</option>
        <option value="za">Z → A</option>
      </select>
    </div>
    <div id="quick-filter-row"></div>
    <div id="qf-notice" style="display:none" class="qf-active-notice">
      <span id="qf-notice-lbl"></span>
      <button class="qf-clear" onclick="clearQuickFilter()">✕ Hapus Filter</button>
    </div>
    <div id="list-grid"></div>
  </div>

  <!-- COL 5-8 · Info Panel (4/8) -->
  <div id="info-panel">
    <div id="info-subtabs"></div>
    <div id="info-content"></div>
  </div>

</div><!-- /app-body -->

<!-- ══ OPTION OVERLAY ══ -->
<div id="opt-overlay" onclick="closeOptPanel()"></div>

<!-- ══ OPTION PANEL ══ -->
<div id="opt-panel">
  <div class="opt-header">
    <div class="opt-title">menu</div>
    <button class="opt-close" onclick="closeOptPanel()">✕ keluar</button>
  </div>
  <div class="opt-nav-btns" id="opt-nav-btns">
    <button class="opt-nav-btn" onclick="openOptSection('prioritas')">
      <span class="onb-icon">📌</span>Prioritas
    </button>
    <button class="opt-nav-btn" onclick="openOptSection('tampilan')">
      <span class="onb-icon">🎨</span>Menu Tampilan
    </button>
    <button class="opt-nav-btn" onclick="openOptSection('preset')">
      <span class="onb-icon">📅</span>Preset Harian
    </button>
  </div>
  <div id="opt-content"></div>
  <div class="opt-back-row" id="opt-back-row" style="display:none">
    <button class="opt-back-btn" onclick="closeOptSection()">← Kembali ke Menu</button>
  </div>
</div>

<!-- ══ MOBILE DRAWER OVERLAY ══ -->
<div id="mob-drawer-overlay" onclick="closeDrawer()"></div>

<!-- ══ BOTTOM TABS (mobile only) ══ -->
<div id="bottom-tabs">
  <div class="btab active" data-f="karakter" onclick="switchFeatureMob('karakter',this)">
    <span class="btab-icon">👥</span>
    <span class="btab-lbl">Karakter</span>
  </div>
  <div class="btab" data-f="item" onclick="switchFeatureMob('item',this)">
    <span class="btab-icon">🎁</span>
    <span class="btab-lbl">Item</span>
  </div>
  <div class="btab" data-f="planning" onclick="switchFeatureMob('planning',this)">
    <span class="btab-icon">📅</span>
    <span class="btab-lbl">Planning</span>
  </div>
  <div class="btab" data-f="prioritas" onclick="switchFeatureMob('prioritas',this)">
    <span class="btab-icon">📌</span>
    <span class="btab-lbl">Prioritas</span>
    <span class="btab-pin-badge" id="btab-pin-badge" style="display:none">0</span>
  </div>
</div>

<!-- ══ SWAP MODAL ══ -->
<div id="swap-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title">Ganti Slot Prioritas</div>
    <div class="modal-sub" id="swap-sub"></div>
    <div id="swap-opts"></div>
    <button class="modal-cancel" onclick="closeSwap()">Batal</button>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
